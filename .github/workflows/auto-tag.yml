name: Auto Tag

on:
  push:
    branches: [main]
    paths: [pyproject.toml]

jobs:
  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check version change
        id: version
        run: |
          NEW=$(grep '^version' pyproject.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          OLD=$(git show HEAD~1:pyproject.toml | grep '^version' | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "old=$OLD" >> "$GITHUB_OUTPUT"
          echo "new=$NEW" >> "$GITHUB_OUTPUT"
          if [ "$OLD" != "$NEW" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag
        if: steps.version.outputs.changed == 'true'
        run: |
          TAG="v${{ steps.version.outputs.new }}"
          git tag "$TAG"
          git push origin "$TAG"
